name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-mingw-w64-i686 g++-mingw-w64-i686

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install DepotDownloader
        run: dotnet tool install -g DepotDownloader

      - name: Fetch ServerBrowser.dll from Steam
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
        run: bash scripts/fetch_originals.sh

      - name: Build all variants
        run: make -f Makefile.mingw

      - name: Get version info
        id: version
        run: |
          echo "short_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "tag=v$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Package Pre-Anniversary
        run: |
          cd Release
          zip -r ../cs16-masterservers-pre-anniversary.zip . -x '*.bak'

      - name: Package Anniversary
        run: |
          cd Release-anniversary
          zip -r ../cs16-masterservers-anniversary.zip . -x '*.bak'

      - name: Package GoldClient
        run: |
          cd Release-goldclient
          zip -r ../cs16-masterservers-goldclient.zip . -x '*.bak'

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: "CS 1.6 Master Servers Restored ${{ steps.version.outputs.tag }}"
          artifacts: |
            cs16-masterservers-pre-anniversary.zip
            cs16-masterservers-anniversary.zip
            cs16-masterservers-goldclient.zip
          body: |
            ## Downloads

            | Build | Description |
            |-------|-------------|
            | **Pre-Anniversary** | Steam Legacy build (pre-25th anniversary update) |
            | **Anniversary** | 25th Anniversary Update build |
            | **GoldClient** | CSPro/GoldClient (non-Steam) |

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for installation instructions.
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
