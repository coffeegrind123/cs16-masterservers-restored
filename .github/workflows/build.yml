name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-mingw-w64-i686 g++-mingw-w64-i686

      - name: Install DepotDownloader
        run: |
          wget -qO /tmp/dd.zip https://github.com/SteamRE/DepotDownloader/releases/latest/download/DepotDownloader-linux-x64.zip
          sudo unzip -o /tmp/dd.zip -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/DepotDownloader

      - name: Fetch ServerBrowser.dll from Steam
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
        run: bash scripts/fetch_originals.sh

      - name: Build all variants
        run: make -f Makefile.mingw

      - name: Get version info
        id: version
        run: |
          echo "short_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "tag=v$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute DLL hashes
        id: hashes
        run: |
          echo "mastersrv=$(sha256sum Release/mastersrv.dll | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sb_legacy=$(sha256sum Release/platform/servers/ServerBrowser.dll | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sb_anniv=$(sha256sum Release-anniversary/platform/servers/ServerBrowser.dll | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "gold_steamapi=$(sha256sum Release-goldclient/steam_api.dll | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Package Pre-Anniversary
        run: |
          cd Release
          zip -r ../cs16-masterservers-pre-anniversary.zip . -x '*.bak'

      - name: Package Anniversary
        run: |
          cd Release-anniversary
          zip -r ../cs16-masterservers-anniversary.zip . -x '*.bak'

      - name: Package GoldClient
        run: |
          cd Release-goldclient
          zip -r ../cs16-masterservers-goldclient.zip . -x '*.bak'

      - name: Get raw log URL
        id: logs
        run: |
          CHECK_ID=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs --jq '.check_runs[] | select(.name == "build") | .id' 2>/dev/null || echo "")
          if [ -n "$CHECK_ID" ]; then
            echo "url=https://github.com/${{ github.repository }}/commit/${{ github.sha }}/checks/${CHECK_ID}/logs" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: "CS 1.6 Master Servers Restored ${{ steps.version.outputs.tag }}"
          artifacts: |
            cs16-masterservers-pre-anniversary.zip
            cs16-masterservers-anniversary.zip
            cs16-masterservers-goldclient.zip
          body: |
            ## Downloads

            | Build | Description |
            |-------|-------------|
            | **Pre-Anniversary** | Steam Legacy build (pre-25th anniversary update) |
            | **Anniversary** | 25th Anniversary Update build |
            | **GoldClient** | CSPro/GoldClient (non-Steam) |

            ## SHA-256 Hashes

            | File | Hash |
            |------|------|
            | `mastersrv.dll` | `${{ steps.hashes.outputs.mastersrv }}` |
            | `ServerBrowser.dll` (pre-anniversary) | `${{ steps.hashes.outputs.sb_legacy }}` |
            | `ServerBrowser.dll` (anniversary) | `${{ steps.hashes.outputs.sb_anniv }}` |
            | `steam_api.dll` (goldclient) | `${{ steps.hashes.outputs.gold_steamapi }}` |

            ## Build Info

            - Commit: [`${{ steps.version.outputs.short_hash }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - [Build log](${{ steps.logs.outputs.url }})

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for installation instructions.
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
